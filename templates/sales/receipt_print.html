<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt {{ receipt.receipt_number }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 24px; }
        .receipt-box { border: 1px solid #e9ecef; padding: 24px; border-radius: 12px; }
        @media print { .no-print { display:none; } }
    </style>
</head>
<body>
    <div class="d-flex justify-content-end no-print mb-3">
        <button class="btn btn-outline-secondary" onclick="window.print()">Print</button>
    </div>

    <div class="receipt-box">
        <h4 class="fw-bold mb-1">Receipt: {{ receipt.receipt_number }}</h4>
        <div class="text-muted mb-3">Generated: {{ receipt.generated_at.strftime('%Y-%m-%d') if receipt.generated_at else '' }}</div>

        <div class="text-muted small">Sale ID: {{ receipt.sale_id }}</div>
    </div>
</body>
</html>
