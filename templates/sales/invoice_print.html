<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice {{ invoice.invoice_number }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 24px; }
        .invoice-box { border: 1px solid #e9ecef; padding: 24px; border-radius: 12px; }
        @media print { .no-print { display:none; } }
    </style>
</head>
<body>
    <div class="d-flex justify-content-end no-print mb-3">
        <button class="btn btn-outline-secondary" onclick="window.print()">Print</button>
    </div>

    <div class="invoice-box">
        <h4 class="fw-bold mb-1">Invoice: {{ invoice.invoice_number }}</h4>
        <div class="text-muted mb-3">Issued: {{ invoice.issued_date.strftime('%Y-%m-%d') if invoice.issued_date else '' }}</div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="text-muted small">Total</div>
                <div class="fw-semibold fs-5">{{ invoice.total }}</div>
            </div>
            <div class="col-md-6">
                <div class="text-muted small">Balance Due</div>
                <div class="fw-semibold fs-5">{{ invoice.balance_due }}</div>
            </div>
        </div>

        <hr>
        <div class="text-muted small">Status: {{ invoice.status }}</div>
    </div>
</body>
</html>
